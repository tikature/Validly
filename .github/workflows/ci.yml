name: Validly CI

on:
  push:
    branches: [ main, develop ]   # setiap push ke main atau develop
  pull_request:
    branches: [ main ]            # setiap PR yang mau merge ke main

jobs:
  test:
    name: Run Tests (PHP ${{ matrix.php }})
    runs-on: ubuntu-latest

    # Matrix: jalankan di beberapa versi PHP sekaligus
    strategy:
      fail-fast: false
      matrix:
        php: [ '8.2' ]  

    # Service: MySQL untuk testing
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ALLOW_EMPTY_PASSWORD: 'yes'
          MYSQL_DATABASE: validly_testing
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      # ── 1. Checkout kode ─────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4.2.2

      # ── 2. Setup PHP ──────────────────────────────────────────────
      - name: Setup PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring, pdo, pdo_mysql, bcmath, xml, ctype, fileinfo
          coverage: xdebug

      # ── 3. Cache Composer dependencies ───────────────────────────
      - name: Cache Composer packages
        uses: actions/cache@v4.2.3
        with:
          path: vendor
          key: composer-${{ runner.os }}-${{ hashFiles('**/composer.lock') }}
          restore-keys: composer-${{ runner.os }}-

      # ── 4. Install Composer dependencies ─────────────────────────
      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      # ── 5. Siapkan .env untuk CI ──────────────────────────────────
      - name: Copy .env for testing
        run: cp .env.example .env

      - name: Generate application key
        run: php artisan key:generate

      # ── 6. Konfigurasi database testing ───────────────────────────
      - name: Configure test database
        run: |
          echo "DB_CONNECTION=mysql"        >> .env
          echo "DB_HOST=127.0.0.1"         >> .env
          echo "DB_PORT=3306"              >> .env
          echo "DB_DATABASE=validly_testing" >> .env
          echo "DB_USERNAME=root"          >> .env
          echo "DB_PASSWORD="      >> .env
          echo "SESSION_DRIVER=array"      >> .env
          echo "CACHE_DRIVER=array"        >> .env

      # ── 7. Jalankan migrasi ke database testing ───────────────────
      - name: Run database migrations
        run: php artisan migrate --force
        env:
          DB_CONNECTION: mysql
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: validly_testing
          DB_USERNAME: root
          DB_PASSWORD: ''

      # ── 8. Jalankan semua test ────────────────────────────────────
      - name: Run tests
        run: php artisan test --parallel --coverage --coverage-html=coverage --min=70
        env:
          DB_CONNECTION: mysql
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: validly_testing
          DB_USERNAME: root
          DB_PASSWORD: ''

      - name: Upload coverage report
        uses: actions/upload-artifact@v4.6.2
        if: always()
        with:
          name: coverage-report
          path: coverage/

      
